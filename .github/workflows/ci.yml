name: Demo Pipeline - CI Security Docker Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0"

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: demo-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/github-actions-demo

jobs:
  quality:
    name: Quality Gate - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests with coverage gate
        run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  container:
    name: Build Test Scan and Publish Container
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t github-actions-demo:scan \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            .

      - name: Smoke test container locally
        run: |
          docker run -d -p 8000:8000 --name demo-api github-actions-demo:scan
          sleep 5
          curl --fail http://localhost:8000/health
          docker logs demo-api
          docker stop demo-api

      - name: Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: github-actions-demo:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: github-actions-demo:scan
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-sbom
          path: sbom.cdx.json

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}